{%- set formats = export_formats(pid.pid_type) %}
{%- if formats %}
<dt>{{_('Export')}}</dt>
<div class="ui horizontal list">
  {%- for slug, fmt in formats %}
  <div class="item"><a href="{{ url_for('invenio_records_ui.recid_export', pid_value=pid.pid_value, format=slug) }}">{{fmt['title']}}</a></div>
  {%- endfor %}
</div>
{%- endif %}
